<div *ngIf="display" class="auth-overlay">
        <div id="signupbox" style="margin-top:50px" class="mainbox col-md-6 col-md-offset-3 col-sm-8 col-sm-offset-2">
            <div class="panel panel-default">
                <div class="panel-heading">
                    <div class="panel-title">Sign Up <span (click)="hide()" class="glyphicon glyphicon-remove" style="float:right; font-size:120%"></span></div>
                </div>
                <div class="panel-body" >
                    <form id="signupform" class="form-horizontal" role="form" [formGroup]="form" (ngSubmit)="onSubmit(form.value)" >

                        <div id="signupalert" style="display:none" class="alert alert-danger">
                            <p>Error:</p>
                            <span></span>
                        </div>

                        <div class="form-group" [ngClass]="{'has-error': (!email.valid && email.touched), 'has-success': (email.valid && email.touched)}">
                            <label for="email" class="col-md-4 control-label">Email</label>
                            <div class="col-md-8">
                                <input [formControl]="email" type="text" class="form-control" name="email" placeholder="email Address">
                            </div>
                        </div>

                        <div class="form-group" [ngClass]="{'has-error': (!password.valid && password.touched), 'has-success': (password.valid && password.touched)}">
                            <label for="password" class="col-md-4 control-label">Password</label>
                            <div class="col-md-8">
                                <input [formControl]="password" type="password" class="form-control" name="password" placeholder="password">
                            </div>
                        </div>
                        
                        <div class="form-group" [ngClass]="{'has-error': (!repeatPassword.valid && repeatPassword.touched), 'has-success': (repeatPassword.valid && repeatPassword.touched)}">
                            <label for="password" class="col-md-4 control-label">Repeat Password</label>
                            <div class="col-md-8">
                                <input [formControl]="repeatPassword" type="password" class="form-control" name="repeatPassword" placeholder="repeat password">
                            </div>
                        </div>

                        <div class="form-group">
                            <!-- Button -->
                            <div class="col-md-offset-4 col-md-8">
                                <button [disabled]="!form.valid" id="btn-signup" type="submit" class="btn btn-info"><i class="icon-hand-right"></i> Sign Up</button>
                                <span style="margin-left:8px;">or</span>
                            </div>
                        </div>

                        <div style="border-top: 1px solid #999; padding-top:20px"  class="form-group">

                            <div class="col-md-offset-3 col-md-9">
                                <button id="btn-fbsignup" type="button" class="btn btn-primary"><i class="icon-facebook"></i>   Sign Up with Facebook</button>
                            </div>

                        </div>



                    </form>
                 </div>
            </div>



          </div>
 </div>
